<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>TierAlto — [Tagline Here]</title>
  <meta name="description" content="[Unique page description, 120–158 characters, summarizing what TierAlto offers and why users should visit.]" />
  <link rel="canonical" href="https://tieralto.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tieralto.com/" />
  <meta property="og:title" content="TierAlto — [Tagline Here]" />
  <meta property="og:description" content="[Same or similar to meta description.]" />
  <meta property="og:image" content="https://tieralto.com/src/assets/images/og-image.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TierAlto — [Tagline Here]" />
  <meta name="twitter:description" content="[Same or similar to meta description.]" />
  <meta name="twitter:image" content="https://tieralto.com/src/assets/images/og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" href="/src/assets/icons/favicon.ico" sizes="any" />
  <link rel="icon" href="/src/assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/src/assets/icons/apple-touch-icon.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "TierAlto",
    "url": "https://tieralto.com",
    "logo": "https://tieralto.com/src/assets/images/logo.png",
    "sameAs": []
  }
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="/src/css/main.css" />
</head>
<body>

  <header class="site-header" role="banner">
    <nav class="nav" aria-label="Main navigation">
      <a class="nav__logo" href="/">
        <img src="/src/assets/images/logo.svg" alt="TierAlto logo" width="120" height="40" />
      </a>
      <ul class="nav__list" role="list">
        <li><a class="nav__link" href="/">Home</a></li>
        <li><a class="nav__link" href="/src/pages/about.html">About</a></li>
        <li><a class="nav__link" href="/src/pages/contact.html">Contact</a></li>
      </ul>
      <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-list">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <main id="main-content">

    <section class="hero" aria-labelledby="hero-heading">
      <div class="container">
        <h1 class="hero__title" id="hero-heading">Welcome to TierAlto</h1>
        <p class="hero__subtitle">[Short value proposition — one or two sentences.]</p>
        <a class="btn btn--primary" href="/src/pages/contact.html">Get Started</a>
      </div>
    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p>&copy; <span id="year"></span> TierAlto. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
