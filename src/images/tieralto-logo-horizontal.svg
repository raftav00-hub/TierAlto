  <rect x="2" y="33" width="40" height="6" rx="3" fill="rgba(255,255,255,0.28)"/>

  <!-- Wordmark -->
  <text x="52" y="36"
    font-family="'Nunito', 'Poppins', 'DM Sans', 'Trebuchet MS', Arial, sans-serif"
